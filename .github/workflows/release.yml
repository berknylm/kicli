name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macOS-arm64
            os: macos-14          # Apple Silicon runner
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=arm64
            artifact: kicli-macos-arm64

          - name: macOS-x86_64
            os: macos-13          # Intel runner
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
            artifact: kicli-macos-x86_64

          - name: Linux-x86_64
            os: ubuntu-22.04
            cmake_args: ""
            artifact: kicli-linux-x86_64

          - name: Windows-x86_64
            os: windows-latest
            cmake_args: ""
            artifact: kicli-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      # ── Dependencies ──────────────────────────────────────────────────────

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja -y
          # Install curl via vcpkg
          vcpkg install curl:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      # ── Configure ─────────────────────────────────────────────────────────

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja \
            ${{ matrix.cmake_args }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build/release `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ── Build ─────────────────────────────────────────────────────────────

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build/release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build/release --config Release

      # ── Package ───────────────────────────────────────────────────────────

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/release/bin/kicli dist/kicli
          cd dist
          tar -czf ../${{ matrix.artifact }}.tar.gz kicli
          echo "Built $(./kicli --version)"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build/release/bin/Release/kicli.exe dist/kicli.exe
          Compress-Archive -Path dist/kicli.exe -DestinationPath ${{ matrix.artifact }}.zip

      # ── Upload artifact ───────────────────────────────────────────────────

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  # ── Create GitHub Release ─────────────────────────────────────────────────

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            **macOS (Apple Silicon)**
            ```bash
            curl -L https://github.com/berknylm/kicli/releases/download/${{ github.ref_name }}/kicli-macos-arm64.tar.gz | tar -xz
            sudo mv kicli /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -L https://github.com/berknylm/kicli/releases/download/${{ github.ref_name }}/kicli-macos-x86_64.tar.gz | tar -xz
            sudo mv kicli /usr/local/bin/
            ```

            **Linux**
            ```bash
            curl -L https://github.com/berknylm/kicli/releases/download/${{ github.ref_name }}/kicli-linux-x86_64.tar.gz | tar -xz
            sudo mv kicli /usr/local/bin/
            ```

            **Windows** — download `kicli-windows-x86_64.zip`, extract and add to PATH.

            ---
            Requires KiCad 10 — [kicad.org/download](https://www.kicad.org/download/)
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
