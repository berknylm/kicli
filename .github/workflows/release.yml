name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # don't cancel other platforms if one fails
      matrix:
        include:
          - name: macOS-arm64
            os: macos-14
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=arm64
            artifact: kicli-macos-arm64

          - name: macOS-x86_64
            os: macos-13
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
            artifact: kicli-macos-x86_64

          - name: Linux-x86_64
            os: ubuntu-22.04
            cmake_args: ""
            artifact: kicli-linux-x86_64

          - name: Windows-x86_64
            os: windows-latest
            cmake_args: ""
            artifact: kicli-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      # ── Dependencies ──────────────────────────────────────────────────────

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja
        # cmake and curl are pre-installed on macOS runners

      - name: Install curl static (Windows)
        if: runner.os == 'Windows'
        # vcpkg is pre-installed on windows-latest at VCPKG_INSTALLATION_ROOT
        # Use static triplet so the binary has no DLL dependency
        run: vcpkg install curl:x64-windows-static --triplet x64-windows-static

      # ── Configure ─────────────────────────────────────────────────────────

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja \
            ${{ matrix.cmake_args }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        # Use VCPKG_INSTALLATION_ROOT directly — no need to re-export it
        run: |
          cmake -B build/release `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCURL_STATIC_LIBS=ON

      # ── Build ─────────────────────────────────────────────────────────────

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build/release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build/release --config Release

      # ── Package ───────────────────────────────────────────────────────────

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/release/bin/kicli dist/kicli
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist kicli
          echo "Packaged: $(dist/kicli --version)"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          # MSVC puts the binary in bin/Release/ with multi-config generators
          $bin = Get-ChildItem -Path build/release -Recurse -Filter kicli.exe | Select-Object -First 1
          Copy-Item $bin.FullName dist/kicli.exe
          Compress-Archive -Path dist/kicli.exe -DestinationPath ${{ matrix.artifact }}.zip

      # ── Upload ────────────────────────────────────────────────────────────

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  # ── Create GitHub Release ─────────────────────────────────────────────────

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: always()   # run even if some platform builds failed
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            **macOS (Apple Silicon)**
            ```bash
            curl -L https://github.com/berknylm/kicli/releases/download/${{ github.ref_name }}/kicli-macos-arm64.tar.gz | tar -xz
            sudo mv kicli /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -L https://github.com/berknylm/kicli/releases/download/${{ github.ref_name }}/kicli-macos-x86_64.tar.gz | tar -xz
            sudo mv kicli /usr/local/bin/
            ```

            **Linux**
            ```bash
            curl -L https://github.com/berknylm/kicli/releases/download/${{ github.ref_name }}/kicli-linux-x86_64.tar.gz | tar -xz
            sudo mv kicli /usr/local/bin/
            ```

            **Windows** — download `kicli-windows-x86_64.zip`, extract `kicli.exe` and add the folder to your PATH.

            ---
            Requires **KiCad 10** — [kicad.org/download](https://www.kicad.org/download/)
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
